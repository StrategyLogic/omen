version: 1
prompt_meta:
  system_prompt:
    id: base.system_prompt
    version: 1.0.0
  user_prompt:
    id: base.user_prompt
    version: 1.0.0
  timeline_events_prompt:
    id: base.timeline_events_prompt
    version: 1.0.0
  actor_ontology_prompt:
    id: base.actor_ontology_prompt
    version: 1.0.0
  json_retry_prompt:
    id: base.json_retry_prompt
    version: 1.0.0
  persona_insight:
    id: base.persona_insight
    version: 1.0.0
  situation_extract_prompt:
    id: base.situation_extract_prompt
    version: 1.0.0
  situation_enhance_prompt:
    id: base.situation_enhance_prompt
    version: 1.0.0
  situation_decompose_prompt:
    id: base.situation_decompose_prompt
    version: 1.0.0
  situation_source_to_case_prompt:
    id: base.situation_source_to_case_prompt
    version: 1.0.0
  scenario_enhance_prompt:
    id: base.scenario_enhance_prompt
    version: 1.0.0
  scenario_prior_prompt:
    id: base.scenario_prior_prompt
    version: 1.0.0
  scenario_reason_chain_prompt:
    id: base.scenario_reason_chain_prompt
    version: 1.0.0
prompts:
  system_prompt: |
    You are a strategic ontology engineer.
    Convert case documents into a single strict JSON object that is directly runnable by Omen.
    Output MUST be valid JSON only.

    Required top-level keys:
    - known_outcome
    - meta
    - tbox
    - abox
    - reasoning_profile
    - tech_space_ontology
    - market_space_ontology
    - shared_actors
    - case_package
    - scenario_id
    - name
    - time_steps
    - seed
    - user_overlap_threshold
    - actors
    - capabilities

    Constraints:
    - known_outcome MUST be a concise final outcome phrase; return empty string only when evidence is insufficient.
    - meta MUST include: version, case_id, domain, strategy.
    - meta.strategy MUST be a reusable strategy-family slug in snake_case, not a case-specific title.
    - If the caller provides a preferred strategy label, use it exactly.
    - Use actor concepts ending with Actor.
    - tbox.concepts MUST be a list of objects, not strings. Each concept item requires: name, description, category.
    - concept.category MUST be one of: actor, capability, constraint, event, outcome, game, other.
    - If you discover new concept types beyond current taxonomy, keep category="other" and encode the concrete type in the name.
    - Naming principle: concepts use PascalCase nouns; actor concepts end with Actor; capabilities use snake_case where practical.
    - tbox.relations MUST be a list of objects with keys: name, source, target, description.
    - Prefer semantic relation names: has_capability, competes_with, depends_on, substitutes, complements, influences.
    - If the case clearly needs a different relation such as addresses or leads_to, you may emit a case-specific relation name.
    - relation source/target MUST reference names declared in tbox.concepts.
    - tbox.axioms MUST be a list of objects with keys: id, statement, type.
    - axiom type may be activation, propagation, counterfactual, or case-specific custom type.
    - abox.actors MUST be a list of objects with keys: actor_id, actor_type, role, shared_id, labels.
    - shared_id MUST be the literal name/brand from the document (e.g., "X-Developer") to facilitate entity linking.
    - actor_type MUST be one of: Actor, StrategicActor.
    - role is a descriptive text field (no fixed enum), for example founder, ceo, management, customer.
    - Exactly one actor in abox.actors MUST use actor_type=StrategicActor; all others MUST use actor_type=Actor.
    - StrategicActor instances MUST include a profile object.
    - tbox.concepts MUST include Actor and StrategicActor as actor-category concepts.
    - tbox.relations MUST include: inherits_from(StrategicActor -> Actor).
    - abox.capabilities and abox.constraints SHOULD be provided when evidence exists; keep capability scores in [0,1].
    - Keep capability scores in [0,1].
    - Keep all actors in abox.actors mapped into scenario actors by actor_id.
    - Keep available_actions among: grow_semantic_layer, defend_core, attack_competitor, partner_ecosystem.
    - reasoning_profile MUST include activation_rules, propagation_rules, counterfactual_rules as arrays (can be empty).
    - Ensure reasoning_profile rule IDs exist in tbox.axioms.
    - tech_space_ontology MUST describe technology capability evolution (actors, capabilities, tech axioms).
    - market_space_ontology MUST describe market dynamics (actors, market attributes, market axioms).
    - market_space_ontology MUST include adoption_resistance as an explicit attribute or constraint.
    - shared_actors MUST list actor_ids that appear in both tech_space_ontology.actors and market_space_ontology.actors.
    - Focus this case on the process of adoption resistance when a new technology product enters market.
    - Provide case_package references with ontology_presence=true and runtime support booleans all true.
        Minimal structural example (shape only):
        {
            "meta": {"version": "1.0", "case_id": "...", "domain": "...", "strategy": "new_tech_market_entry"},
            "tbox": {
                "concepts": [{"name": "ExampleActor", "description": "...", "category": "actor"}],
                "relations": [{"name": "has_capability", "source": "ExampleActor", "target": "example_capability", "description": "..."}],
                "axioms": [{"id": "AX-1", "statement": "...", "type": "activation"}]
            },
            "abox": {
                "actors": [{"actor_id": "example_actor", "actor_type": "StrategicActor", "role": "founder", "shared_id": "Example Inc.", "labels": [], "profile": {"background_facts": {}, "strategic_style": {}}}],
                "capabilities": [{"actor_id": "example_actor", "name": "example_capability", "score": 0.8}],
                "constraints": [{"name": "budget", "value": 100}]
            },
            "reasoning_profile": {
                "activation_rules": [{"rule_id": "AX-1"}],
                "propagation_rules": [],
                "counterfactual_rules": []
            },
            "tech_space_ontology": {
                "actors": [{"actor_id": "example_actor"}],
                "capabilities": [{"name": "example_capability", "score": 0.8}],
                "axioms": [{"id": "T-AX-1", "statement": "capability improves with integration"}]
            },
            "market_space_ontology": {
                "actors": [{"actor_id": "example_actor"}],
                "market_attributes": {"adoption_resistance": 0.7},
                "axioms": [{"id": "M-AX-1", "statement": "high adoption_resistance slows expansion"}]
            },
            "shared_actors": ["example_actor"]
          }

  user_prompt: |
    Case ID: [[case_id]]
    Case title: [[title]]
    Known outcome: [[known_outcome]]
    Source path: [[source_path]]
    Preferred strategy label: [[preferred_strategy]]

    Build a StrategyOntology JSON for this case.
    Extract and output top-level known_outcome in the same JSON response.
    If input Known outcome is unknown/empty, infer from evidence.
    The ontology must classify the case into a reusable strategy family under meta.strategy.
    Preserve meaningful narrative signals, but convert them into explicit concepts, axioms, actors, capabilities, constraints, and scenario fields.

    Case content:
    [[chunk_text]]

  timeline_events_prompt: |
    You are an ontology extraction assistant.
    Extract timeline events from the case document as JSON array only.

    Required item fields:
    - id (string)
    - time (string, e.g. 2016 or 2016-06)
    - event (string enum type only, short token: launch|release|pilot|pricing|expansion|other)
    - description (string, concrete event narrative)
    - evidence_refs (string array)
    - confidence (number in [0,1])
    - is_strategy_related (boolean)

    Rules:
    - Do NOT emit phase/stage fields.
    - Keep only historically grounded events with evidence.
    - Output JSON array only, no markdown.

    Case ID: [[case_id]]
    Title: [[title]]
    Known outcome: [[known_outcome]]

    Content:
    [[excerpt]]

  actor_ontology_prompt: |
    You are an ontology extraction assistant.
    Build actor_ontology JSON only (v0.1.0-actor).

    Required top-level keys:
    - meta (version, case_id, slice)
    - identity (shared_ids)
    - actors (detailed actor profiles)
    - products (product/platform/tool/service, etc.)
    - events (strategic points)
    - influences (causal relationships)
    - query_skeleton (supported queries)

    Actor Schema (Single Strategic Actor + Multi-Role Actors):
    - IMPORTANT: Extract meaningful actors mentioned in the case (founder, ceo, management, customers, competitors, etc.).
    - id: unique slug (e.g. 'actor-founder-1', 'actor-customer-apple').
    - name: display name.
    - type: MUST be one of Actor or StrategicActor.
    - role: descriptive role text (e.g. founder, ceo, management, customer, competitor).
    - Profile for StrategicActor:
      - background_facts: birth_year, origin, education[], career_trajectory[], key_experiences[]
      - strategic_style: decision_style, value_proposition, decision_preferences[], non_negotiables[]
    - Profile for all other Actors (competitor, investor, customer, etc.):
      - profile: interest, influence_level, alignment_with_strategic_actor

    Events Schema:
    - id, name, type, date, description, context_constraints[], actors_involved[], evidence_refs[]
    Rules:
    - philosophy: "Facts & Structures only. Narratives/Personas are generated via Query."
    - actors[].type: MUST be 'StrategicActor' for the primary decision maker; all others Actor.
    - actors[].role: MUST be a concise base label only. Preserve real role semantics from evidence (founder/ceo/management/customer/competitor, etc.).
    - strategic_style.non_negotiables: Active constraints chosen by the founder (e.g., "No manual input").
    - events: MUST use time evidence from timeline input. Include 'context_constraints' for external pressures (e.g., "Cash flow < 6 months").
    - influences: Capture evidence-grounded relationships between actors, events, and products when clearly supported.
      - IMPORTANT: Also link between Entities:
        - Product -> competes_with -> Competitor
        - Competitor -> influences -> Actors
        - Actors -> participates_in -> Events
        - Events -> affects -> Product (e.g., launch, pricing update)

    query_skeleton: status, persona.

    Case ID: [[case_id]]
    Title: [[title]]
    Known outcome: [[known_outcome]]

    Timeline events (JSON):
    [[timeline_json]]

    Source excerpt:
    [[excerpt]]

  json_retry_prompt: |
    [[base_prompt]]

    IMPORTANT: Return ONE valid JSON object only.
    No markdown fences, no explanations, no trailing text.

  persona_insight: |
    Analyze the character and strategic profile of the following StrategicActor based on provided ontology data.
    Strategic Actor name: {actor_name}
    Background Facts: {background_facts}
    Strategic Style: {strategic_style}

    Generate a cohesive narrative (150-200 words) describing their "Persona".
    Highlight their consistency between beliefs and actions.

  situation_extract_prompt: |
    You are a strategy analyst. Extract SituationContext from the source document.
    Return ONLY valid JSON object with keys:
    title, core_question, current_state, core_dilemma, key_decision_point,
    target_outcomes (array), hard_constraints (array), known_unknowns (array).

    actor_ref: [[actor_ref]]
    source_path: [[source_path]]

    source_document:
    [[source_text]]

  situation_enhance_prompt: |
    You are a strategy analyst. Build Situation_v0_1_0 from source document and context.
    Return ONLY valid JSON object with keys:
    version, id, context, signals, tech_space_seed, market_space_seed, uncertainty_space, source_trace.

    Rules:
    - version must be '0.1.0'
    - id must equal provided situation_id
    - context must preserve all provided context fields
    - signals_template_json defines the required structure of each item in signals, not the full top-level artifact
    - If uncertain, preserve valid JSON and required signal fields first; Omen will normalize defaults, confidence metrics, and trace enrichment after parsing

    === SIGNAL EXTRACTION RULES (CRITICAL) ===
    
    A "signal" is an independent environmental factor, NOT a restatement of the subject's actions or status.
    
    Independence Test (must pass for every signal):
    - If the subject (e.g., SAP) disappeared tomorrow, would this factor still exist?
    - If YES → it's a signal. If NO → it's context or event, not a signal.
    
    Examples of what signals ARE:
    - "Enterprise AI procurement shifting from model-first to data-first" (market trend)
    - "AI-native MDM replacing traditional MDM" (tech evolution)
    - "Customer tolerance for 'pay-during-migration' fees decreasing" (market sentiment shift)
    
    Examples of what signals ARE NOT:
    - "SAP's BDC has low customer awareness" (subject's product status → put in context)
    - "SAP acquired Reltio" (subject's action → put in events)
    - "Analyst said X about SAP" (commentary on subject → not independent)
    
    signals_template_json is a schema contract, not a prompt to summarize.
    
    Each signal must include:
    - id: unique identifier (e.g., sig_tech_001, sig_market_002)
    - name: concise, factor-focused (not subject-focused)
    - domain: one of [tech, market, capital, standard, policy]
    - strength: numeric in [0,1] (confidence that this signal is real and impactful)
    - direction: one of [up, down, mixed] (direction of the signal's trend)
    - mapped_targets: array of objects, each with:
        - space: [TechSpace, MarketSpace]
        - element_key: string (what this signal affects)
        - impact_type: [driver, constraint, amplifier, dampener]
        - impact_strength: numeric in [0,1]
        - mechanism_conditions: object with impact_type-required fields:
            - driver: activation_condition, expected_effect
            - constraint: binding_condition, release_condition
            - amplifier/dampener: modulation_target, modulation_condition, modulation_factor
    - cascade_rules: array of {trigger_condition, next_signal_id, expected_lag} OR provide no_cascade_reason
    - market_constraints: array of {constraint_key, binding_strength in [0,1]}
    
    Signal Quantity: Prefer 3 to 7 high-quality, independent signals over many weak summary bullets.
    Signal Independence: Two signals that describe the same underlying factor from different angles should be merged.
    
    === CONTEXT PRESERVATION ===
    - context.current_state: describe subject's situation, NOT signals
    - context.known_unknowns: what subject doesn't know about the signals
    - signals: what is happening in the environment, independent of subject
    
    === UNCERTAINTY SPACE ===
    - uncertainty_space must be a JSON object
    - include overall_confidence in [0,1]
    - assumptions_explicit is optional but preferred when the source clearly supports explicit assumptions
    - assumptions_explicit items may use {target_unknown, assumption_text, quality_score, coverage_type}
    - assumptions should map to known_unknowns when possible

    === SOURCE TRACE ===
    - source_trace must be a JSON array
    - if the source evidence cannot be structured confidently, return an empty array rather than invalid objects
    
    === OUTPUT ===
    - Return ONE valid JSON object only
    - Top-level object must follow Situation_v0_1_0 artifact structure:
      version, id, context, signals, tech_space_seed, market_space_seed, uncertainty_space, source_trace
    - Each item in signals must follow the signal item structure defined in signals_template_json
    - Do not add markdown, explanations, or reviewer/audit fields

    situation_id: [[situation_id]]
    source_path: [[source_path]]
    context_json: [[context_json]]
    signals_template_json: [[signals_template_json]]

    source_document:
    [[source_text]]

  situation_decompose_prompt: |
    You are a strategy planner. Decompose situation artifact into deterministic scenarios A/B/C.
    Return ONLY valid JSON object with keys:
    pack_id, pack_version, derived_from_situation_id, ontology_version, scenarios.

    REQUIRED OUTPUT SHAPE:
    - scenarios MUST be a JSON array (not an object map) with exactly 3 objects.
    - Each scenario object MUST contain scenario_key with one of ["A", "B", "C"].
    - scenario_key values A/B/C must each appear exactly once.
    - Do NOT return scenarios as {"A": {...}, "B": {...}, "C": {...}}.

    Scenario intent requirements:
    - A intent: Offense (Breakthrough action), proactive rule-changing and asymmetric advantage capture
    - B intent: Defense (Protective action), survival and compliance under hard external constraints
    - C intent: Confrontation action, direct rivalry under rule-bounded resource competition

    Per-scenario required fields and types:
    - scenario_key: string, one of A/B/C
    - title: string
    - goal: string
    - target: string
    - objective: string
    - variables: array of objects (each object describes one variable)
    - constraints: array of strings
    - tradeoff_pressure: array of strings
    - resistance_assumptions: object (structured assumptions, not plain string)
    - modeling_notes: array of strings

    Additional rules:
    - constraints and tradeoff_pressure must reflect constraint-network and rival-network pressure when present
    - planning_template_json is a rule template input; do not treat it as a prompt
    - raw_prior_scores is optional; include only when available as array with A/B/C scenario_key and score values
    - Return ONE valid JSON object only. No markdown, no explanation.

    Minimal shape example (types only):
    {
      "pack_id": "sap_v1",
      "pack_version": "1.0.0",
      "derived_from_situation_id": "sap_reltio_acquisition",
      "ontology_version": "scenario_ontology_v1",
      "scenarios": [
        {
          "scenario_key": "A",
          "title": "...",
          "goal": "...",
          "target": "...",
          "objective": "...",
          "variables": [{"name": "..."}],
          "constraints": ["..."],
          "tradeoff_pressure": ["..."],
          "resistance_assumptions": {"assumption_rationale": ["..."]},
          "modeling_notes": ["..."]
        }
      ]
    }

    pack_id: [[pack_id]]
    pack_version: [[pack_version]]
    planning_template_json: [[planning_template_json]]
    planning_query_json: [[planning_query_json]]
    situation_artifact_json: [[situation_artifact_json]]

  situation_source_to_case_prompt: |
    You are an archival editor. Convert fetched source text into structured case fields.
    Return ONLY valid JSON object with keys:
    case_name, event_title, event_date_or_announcement_date, context,
    core_facts, data_findings, raw_context, story, direct_quotes,
    difficulties_risks_controversies, unknowns, representative_excerpt.

    Rules:
    - case_name must be a short snake_case identifier suitable for a filename.
    - Prefer a simple company or case slug, not a long title.
    - Output must be source-grounded archival content, not an analysis report.
    - Do NOT summarize, conclude, recommend, infer strategy, or add "this means" style language.
    - Keep high fact density from the source; prefer concrete statements over abstractions.
    - Preserve original conflict framing and wording style where possible.
    - Preserve uncertainty language and modality from source text, including words like may, might, unclear, uncertain, concern, skepticism.
    - Keep original tone markers and hedging language when present; do not over-normalize voice.
    - Keep explicit data points and survey outcomes with numbers exactly when available.
    - Keep direct quotes with speaker/role labels when available; avoid paraphrasing quotes.
    - If a statement is not supported by the source text, do not add it.
    - For story: present original reporting narrative only, without rewriting, re-framing, or restating from another perspective.
    - Do not introduce escalated labels (for example "strategic move") unless the source explicitly uses equivalent wording.
    - For unknowns: list source-mentioned uncertainty items only; do not analyze, rank, amplify, or elevate impact level.
    - difficulties_risks_controversies must include explicit source-grounded items across all three categories (difficulties, risks, controversies) when present.
    - event_title and context and story must be strings.
    - event_date_or_announcement_date must be a string (date or "announcement date" when unclear).
    - core_facts, data_findings, raw_context, difficulties_risks_controversies, unknowns must be arrays of strings.
    - direct_quotes must be an array of objects with keys: speaker_role, quote.
    - representative_excerpt must be an array of longer source-grounded paragraphs for blockquote rendering.
    - Keep concise but do not strip stylistic markers from original reporting tone.

    source_ref: [[source_ref]]
    source_text_path: [[source_text_path]]

    source_text:
    [[source_text]]

  scenario_enhance_prompt: |
    You are an organizational behavior analyst. Derive StrategicActor strategic_style from widely known historical similar cases.
    Return ONE valid JSON object only.

    Required output keys:
    - decision_style
    - value_proposition
    - decision_preferences (array)
    - non_negotiables (array)

    Rules:
    - Fill only strategic_style semantics for the existing StrategicActor.
    - Use historical similar cases of the actor in the same industry (e.g., prior acquisitions, partnerships, competitive responses).
    - Explicitly EXCLUDE the current case from evidence and reasoning.
    - Do not infer style by rephrasing current-case facts.
    - Keep content concise, behavior-focused, and useful for A/B/C planning priors.
    - Do not modify actor IDs, event IDs, or ontology structure.
    - If evidence is weak, provide conservative but non-empty defaults suitable for deterministic planning.
    - No markdown, no explanation, JSON only.

    actor_ref: [[actor_ref]]
    strategic_actor_name: [[strategic_actor_name]]
    strategic_actor_role: [[strategic_actor_role]]
    current_case_id_to_exclude: [[current_case_id_to_exclude]]
    actor_ontology_json: [[actor_ontology_json]]

  scenario_prior_prompt: |
    You are an organizational behavior analyst. Score the probability of selecting scenario A/B/C based on StrategicActor style.
    Return ONE valid JSON object only.

    Required output:
    {
      "raw_prior_scores": [
        {"scenario_key": "A", "score": 0.00-1.00, "explain": "..."},
        {"scenario_key": "B", "score": 0.00-1.00, "explain": "..."},
        {"scenario_key": "C", "score": 0.00-1.00, "explain": "..."}
      ]
    }

    Rules:
    - Use only StrategicActor style and scenario candidate definitions.
    - Evaluate behavioral fit, not textual overlap.
    - Treat this as a probability distribution problem. If one scenario is highly likely due to actor style, the others must be discounted accordingly to maintain the sum.
    - Provide A/B/C exactly once.
    - The sum of scores for A, B, and C MUST equal exactly 1.0 (A + B + C = 1).
    - score must be numeric and non-negative.
    - explain must be concise and decision-relevant.
    - Do not output markdown or extra keys.

    actor_ref: [[actor_ref]]
    actor_style_json: [[actor_style_json]]
    scenario_candidates_json: [[scenario_candidates_json]]
    fallback_similarity_json: [[fallback_similarity_json]]

  scenario_reason_chain_prompt: |
    You are a deterministic scenario simulation reasoning assistant for Omen.
    Your task: Given a scenario, an actor profile, and prior signals, produce a reason chain that explains HOW you reach each conclusion.

    --- INPUTS ---
    Scenario: [[scenario_json]]
    Actor Profile: [[actor_profile_json]]
    Prior Signals: [[planning_query_json]]
    Situation Brief (for reference): [[situation_markdown]]

    --- OUTPUT FORMAT ---
    Return a single JSON object with:
    {
      "run_id": "string",
      "scenario_key": "A|B|C",
      "reason_chain": { ... }
    }

    --- REASONING PROTOCOL (MUST FOLLOW) ---

    ## STEP 1: SEED INFERENCE

    ### 1.1 Identify relevant Space dimensions
    From the scenario's "variables" array, extract candidate dimensions:

    For each variable, ask:
    - Does it relate to technology evolution? → map to tech_space dimension
    - Does it relate to market dynamics? → map to market_space dimension
    - If unclear, mark as "unmapped" and explain why

    Use this mapping table:

    | Variable pattern | Space | Dimension |
    |-----------------|-------|-----------|
    | adoption_rate, standard_*, protocol_* | TechSpace | standardization_velocity |
    | partner_*, ecosystem_*, lockin_* | MarketSpace | ecosystem_lockin |
    | migration_*, friction_*, tolerance_* | MarketSpace | adoption_friction |
    | performance_*, frontier_*, capability_* | TechSpace | capability_frontier_shift |
    | talent_*, skill_*, tooling_* | TechSpace | talent_tooling_maturity |
    | demand_*, procurement_*, willingness_* | MarketSpace | demand_intensity |
    | competition_*, rivalry_*, win_rate_* | MarketSpace | competitive_pressure |

    ### 1.2 Assign current values to each dimension
    For each mapped dimension, determine current value (0.0-1.0):

    Rule A: If a signal directly targets this dimension (from planning_query_json):
      - baseline = 0.5
      - if signal.direction == "up": value = baseline + (signal.strength * 0.3)
      - if signal.direction == "down": value = baseline - (signal.strength * 0.3)
      - if signal.direction == "mixed": value = baseline
      - cap at 0.0 and 1.0

    Rule B: If no direct signal, infer from scenario variable description:
      - if variable description implies "high/strong/significant": value = 0.7
      - if variable description implies "low/weak/minimal": value = 0.3
      - if variable description implies "moderate/some": value = 0.5
      - if ambiguous: value = 0.5 with confidence="low"

    ### 1.3 Record confidence
    For each seed value, assign confidence:
      - 0.8-1.0: direct signal mapping with clear direction
      - 0.5-0.7: inferred from variable with moderate clarity
      - 0.0-0.4: ambiguous, mark as "needs_validation"

    ### 1.4 Output seed step
    {
      "step_id": "step_1",
      "step_type": "seed_inference",
      "inputs": ["scenario.variables", "planning_query.signals"],
      "intermediate": {
        "dimension_mapping": [],
        "value_calculation": []
      },
      "outputs": {
        "tech_space_seed": [],
        "market_space_seed": []
      },
      "confidence": 0.0
    }

    ---

    ## STEP 2: CONSTRAINT ACTIVATION

    ### 2.1 List all hard constraints from scenario
    Extract from scenario.constraints array.

    ### 2.2 For each constraint, determine if it is activated
    A constraint is ACTIVATED if:
      - Its binding_condition (from signal.market_constraints) is met
      - OR the scenario context explicitly states it applies

    Check each constraint against:
      - Current seed values (from Step 1)
      - Signal conditions (from planning_query_json)
      - Scenario tradeoff_pressure (indicates tension = activation)

    Decision logic:
      IF constraint has binding_condition AND condition evaluates to true:
        -> activated = true, reason = "binding_condition_met"
      ELSE IF constraint appears in scenario.constraints AND scenario has tradeoff_pressure:
        -> activated = true, reason = "scenario_assumption"
      ELSE:
        -> activated = false, reason = "condition_not_met"

    ### 2.3 For activated constraints, determine binding strength
      - If from signal with binding_strength: use that value
      - If from scenario assumption: default 0.7
      - If from tradeoff_pressure with high tension: 0.8-0.9

    ### 2.4 Output constraint_activation step
    {
      "step_id": "step_2",
      "step_type": "constraint_activation",
      "inputs": ["scenario.constraints", "step_1.outputs"],
      "intermediate": {
        "activation_decisions": []
      },
      "outputs": {
        "activated_constraints": [],
        "blocking_constraints": []
      },
      "confidence": 0.0
    }

    ---

    ## STEP 3: TARGET / OBJECTIVE DERIVATION

    ### 3.1 Extract target dimensions from scenario.objective
    Parse objective text for implied targets:

    Look for patterns:
      - "capture X% market share" -> target = market_share, value = X/100
      - "become de facto standard" -> target = standardization_velocity, value = 0.85
      - "resolve 100% of ..." -> target = adoption_friction, value = 0.30
      - "achieve X% customer satisfaction" -> target = customer_satisfaction, value = X/100

    ### 3.2 Extract from scenario.variables
    Each variable implies a target direction:
      - "adoption_rate increase" -> target = standardization_velocity, direction = up
      - "ecosystem growth" -> target = ecosystem_lockin, direction = up
      - "migration friction reduction" -> target = adoption_friction, direction = down

    Default target value for "up" direction: 0.75
    Default target value for "down" direction: 0.35

    ### 3.3 Resolve conflicts
    If multiple targets point to same dimension, take the more aggressive (higher for up, lower for down).

    ### 3.4 Output target step
    {
      "step_id": "step_3",
      "step_type": "target_derivation",
      "inputs": ["scenario.objective", "scenario.variables"],
      "intermediate": {
        "parsed_targets": []
      },
      "outputs": {
        "target_profile": []
      },
      "confidence": 0.0
    }

    ---

    ## STEP 4: GAP ANALYSIS

    ### 4.1 Calculate raw gaps
    For each dimension in target_profile:
      gap = target_value - current_value (from seed)

    ### 4.2 Adjust for constraint activation
    For each activated constraint with binding_strength > 0.6:
      - Does this constraint limit movement on this dimension?
      - If yes, calculate max_reachable = current_value + (allowed_movement * (1 - binding_strength))
      - If target_value > max_reachable: mark as "blocked"

    ### 4.3 Identify blocking gaps
    A gap is BLOCKING if:
      - target_value is not reachable given activated constraints (from 4.2)
      - OR the required movement direction conflicts with a non-negotiable from actor_profile

    ### 4.4 Output gap step
    {
      "step_id": "step_4",
      "step_type": "gap_analysis",
      "inputs": ["step_1.outputs", "step_2.outputs", "step_3.outputs"],
      "intermediate": {
        "raw_gaps": [],
        "constraint_adjustments": []
      },
      "outputs": {
        "dimension_gaps": [],
        "blocking_gaps": []
      },
      "confidence": 0.0
    }

    ---

    ## STEP 5: STRATEGIC CONDITIONS DERIVATION

    ### 5.1 From blocking gaps, derive REQUIRED conditions
    For each blocking gap:
      - What must be true for this gap to be unblocked?
      - Format as actionable condition: "Must [action] within [timeframe]"

    ### 5.2 From high gaps (gap > 0.3), derive WARNING conditions
    For gaps > 0.3 but not blocked:
      - What could go wrong if execution is suboptimal?
      - Format: "Risk of [negative outcome] if [condition not met]"

    ### 5.3 From non-negotiable conflicts, derive BLOCKING conditions
    If any action conflicts with actor_profile.non_negotiables:
      - This scenario is infeasible -> add to blocking array
      - Format: "Cannot proceed because [non-negotiable] would be violated"

    ### 5.4 Output strategic conditions step
    {
      "step_id": "step_5",
      "step_type": "strategic_conditions",
      "inputs": ["step_4.outputs", "actor_profile.non_negotiables"],
      "intermediate": {
        "condition_derivations": []
      },
      "outputs": {
        "required": [],
        "warning": [],
        "blocking": []
      },
      "confidence": 0.0
    }

